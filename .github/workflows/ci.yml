name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - run: go test ./...
      - run: go vet ./...
      - run: go run ./cmd/vflow schema --validate --format json
      - run: go run ./cmd/vflow doctor --local --format json
      - run: go run ./cmd/vflow audit cli --format json
