name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - run: go test ./...
      - run: go vet ./...
      - run: go run ./cmd/vflow schema --validate --format json
      - run: go run ./cmd/vflow doctor --format json
      - run: go run ./cmd/vflow audit cli --format json
