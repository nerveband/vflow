version: 2

builds:
  - id: vflow
    main: ./cmd/vflow
    binary: vflow
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/nerveband/vflow/internal/cli.Version={{.Version}}
      - -X github.com/nerveband/vflow/internal/cli.Commit={{.Commit}}
      - -X github.com/nerveband/vflow/internal/cli.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
